name: CI Pipeline

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0.45
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ticketing_db
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --  --max-warnings=0 || true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend with Maven
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for MySQL..."
          sleep 10
          docker exec ticketing_mysql mysqladmin ping -h localhost -u root -proot
          echo "Waiting for Backend..."
          for i in {1..30}; do
            if curl --max-time 2 http://localhost:8080/api/health 2>/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... attempt $i"
            sleep 2
          done
          echo "Warning: Backend may not be ready yet"

      - name: Check service logs
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend
          echo "=== Frontend logs ==="
          docker compose logs frontend
          echo "=== MySQL logs ==="
          docker compose logs mysql

      - name: Stop services
        if: always()
        run: docker compose down -v

  notify:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Pipeline status
        run: |
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "✅ Pipeline completed successfully!"
          else
            echo "❌ Pipeline failed!"
          fi
